<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JeevanSaathi Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:#ff4d6d;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:34px;
color:#ff4d6d;
margin-bottom:10px;
}

.card p{
font-size:18px;
}

.section{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-top:25px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#ff4d6d;
color:white;
}

button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.delete{
background:red;
}

.premium{
background:green;
}

.block{
background:#555;
}

.premium{

background:#28a745;
margin-right:5px;

}

.block{

background:#555;
margin-right:5px;

}

.view{

background:#2196f3;
margin-right:5px;

}

.delete{

background:#dc3545;

}

</style>

</head>

<body>

<div class="header">
❤️ JeevanSaathi Admin Panel
</div>

<p id="lastUpdate"
style="
text-align:center;
margin-top:8px;
color:rgb(4, 2, 2);
">

Last Update : --

</p>

<div class="container">

<div style="margin-bottom:20px;">

<input
id="searchUser"
type="text"
placeholder="🔍 Search by Name or Mobile"
onkeyup="searchUsers()"
style="
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
">

</div>

<div style="margin-bottom:20px;text-align:right;">

<button
style="
background:#ff4d6d;
padding:10px 20px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
"
onclick="loadUsers()">

🔄 Refresh Dashboard

</button>

</div>

<div class="cards">

<div class="card">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="card" onclick="openPremiumUsers()" style="cursor:pointer;">

<h2 id="totalPremium">0</h2>

<p>👑 Premium Users</p>

</div>

<div class="card">
<h2 id="totalMatches">0</h2>
<p>Total Matches</p>
</div>

<div class="card">
<h2 id="totalReports">0</h2>
<p>Reports</p>
</div>

</div>

<div class="section">

<h2 style="margin-bottom:20px;">
👥 All Users
</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Photo</th>
<th>Name</th>
<th>Mobile</th>
<th>Gender</th>
<th>City</th>
<th>Premium</th>
<th>Action</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

</div>

<div class="section">

<h2 style="margin-bottom:20px;">
🚩 Reported Users
</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Reporter</th>
<th>Reported User</th>
<th>Reason</th>
<th>Action</th>

</tr>

</thead>

<tbody id="reportTable">

<tr>

<td colspan="5" style="text-align:center;">
No Reports
</td>

</tr>

</tbody>

</table>

</div>


<script>

async function loadPremiumUsers(){

    try{

        const response = await fetch(API + "/admin/premium-users");

        const result = await response.json();

        let html = "";

        if(result.users.length===0){

            html = `
            <tr>
                <td colspan="5" style="text-align:center;">
                    No Premium Users 👑
                </td>
            </tr>
            `;

        }else{

            result.users.forEach(user=>{

                html += `

                <tr>

                <td>${user.id}</td>

                <td>

                <img
                src="${user.photo ? API+user.photo : ''}"
                style="
                width:60px;
                height:60px;
                border-radius:50%;
                object-fit:cover;
                ">

                </td>

                <td>${user.name}</td>

                <td>${user.mobile}</td>

                <td>${user.city || "-"}</td>

                </tr>

                `;

            });

        }

        document.getElementById("premiumTable").innerHTML = html;

    }catch(error){

        console.log(error);

        alert("Unable to load Premium Users");

    }

}


function openPremiumUsers(){

document.getElementById("premiumPopup").style.display="block";

loadPremiumUsers();

}

function closePremiumUsers(){

document.getElementById("premiumPopup").style.display="none";

}


async function loadReports(){

    try{

        const response = await fetch(API + "/admin/reports");

        const result = await response.json();

        if(!result.status){

            return;

        }

        let html="";

        if(result.reports.length===0){

            html = `
            <tr>
            <td colspan="5" style="text-align:center;">
            No Reports Found
            </td>
            </tr>
            `;

        }else{

            result.reports.forEach(report=>{

                html += `

                <tr>

                <td>${report.id}</td>

                <td>${report.reporter}</td>

                <td>${report.reported}</td>

                <td>${report.reason}</td>

                <td>

                <button
                class="block"
                onclick="blockReportedUser(${report.id})">

                🚫

                </button>

                <button
                class="delete"
                onclick="deleteReport(${report.id})">

                🗑

                </button>

                </td>

                </tr>

                `;

            });

        }

        document.getElementById("reportTable").innerHTML = html;

        document.getElementById("totalReports").innerHTML = result.reports.length;

    }catch(error){

        console.log(error);

    }

}    


async function viewUser(userId){

    try{

        const response = await fetch(API + "/profile/" + userId);

        const result = await response.json();

        if(!result.status){

            alert(result.message);
            return;

        }

        const user = result.profile;

        document.getElementById("viewData").innerHTML = `

        <div style="text-align:center;">

        <img
        src="${user.photo ? API + user.photo : ''}"
        style="
        width:120px;
        height:120px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid #ff4d6d;
        ">

        <h2>${user.name}</h2>

        <p>📱 ${user.mobile}</p>
        <p>👤 ${user.gender}</p>
        <p>💕 ${user.looking_for}</p>
        <p>🎂 ${user.age}</p>
        <p>📏 ${user.height}</p>
        <p>🛕 ${user.religion}</p>
        <p>👥 ${user.caste}</p>
        <p>🎓 ${user.education}</p>
        <p>💼 ${user.occupation}</p>
        <p>📍 ${user.city}</p>

        <p style="margin-top:15px;">
        ${user.about || ""}
        </p>

        </div>

        `;

        document.getElementById("viewPopup").style.display = "block";

    }catch(error){

        console.log(error);

        alert("Server Error");

    }

}

function closeView(){

    document.getElementById("viewPopup").style.display = "none";

}


function searchUsers(){

const value = document.getElementById("searchUser").value.toLowerCase();

const rows = document.querySelectorAll("#userTable tr");

rows.forEach(row=>{

const text = row.innerText.toLowerCase();

if(text.includes(value)){

row.style.display="";

}else{

row.style.display="none";

}

});

}

async function blockUser(userId){

    if(!confirm("Block this user?")){
        return;
    }

    try{

        const response = await fetch(
            API + "/admin/block-user/" + userId,
            {
                method:"POST"
            }
        );

        const result = await response.json();

        alert(result.message);

        if(result.status){
            loadUsers();
        }

    }catch(error){

        console.log(error);

        alert("Server Error");

    }

}


async function deleteUser(userId){

    if(!confirm("Delete this user?")){
        return;
    }

    try{

        const response = await fetch(
            API + "/admin/delete-user/" + userId,
            {
                method:"DELETE"
            }
        );

        const result = await response.json();

        alert(result.message);

        if(result.status){
            loadUsers();
        }

    }catch(error){

        console.log(error);

        alert("Server Error");

    }

}

async function makePremium(userId){

    if(!confirm("Make this user Premium?")){
        return;
    }

    try{

        const response = await fetch(
            API + "/admin/make-premium/" + userId,
            {
                method:"POST"
            }
        );

        const result = await response.json();

        alert(result.message);

        if(result.status){
            loadUsers();
        }

    }catch(error){

        console.log(error);

        alert("Server Error");

    }

}

const API="https://lovely-matrimony.onrender.com";

async function loadUsers(){

    try{

        const response = await fetch(API + "/admin/users");

        const result = await response.json();

        if(!result.status){

            alert("Users not found");

            return;

        }

        let html="";

        if(result.users.length===0){

document.getElementById("userTable").innerHTML=

"<tr><td colspan='8' style='text-align:center;'>No Users Found</td></tr>";

return;

}
        result.users.forEach(user=>{

            html += `

            <tr>

            <td>${user.id}</td>

            <td>

            <img
            src="${user.photo ? API+user.photo : ''}"
            style="
            width:60px;
            height:60px;
            border-radius:50%;
            object-fit:cover;
            ">

            </td>

            <td>${user.name}</td>

            <td>${user.mobile}</td>

            <td>${user.gender}</td>

            <td>${user.city || "-"}</td>

            <td>

            ${user.is_premium ? "👑 Premium" : "Free"}

            </td>

           <td>

<button
class="premium"
onclick="makePremium(${user.id})">

👑

</button>

<button
class="block"
onclick="blockUser(${user.id})">

🚫

</button>

<button
class="view"
onclick="viewUser(${user.id})">

👁

</button>

<button
class="delete"
onclick="deleteUser(${user.id})">

🗑

</button>

</td>

            </tr>

            `;

        });

        document.getElementById("userTable").innerHTML = html;

        document.getElementById("totalUsers").innerHTML = result.users.length;

        let premiumCount = result.users.filter(user => user.is_premium).length;

        document.getElementById("totalPremium").innerHTML = premiumCount;

        document.getElementById("lastUpdate").innerHTML=

        "Last Update : "+new Date().toLocaleTimeString();

    }

    catch(error){

        console.log(error);

        alert("Server Error");

    }

}

loadUsers();
loadReports();

setInterval(function(){

loadUsers();
loadReports();

},30000);


</script>


<div id="viewPopup"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:9999;
">

<div
style="
background:white;
width:90%;
max-width:500px;
margin:40px auto;
padding:20px;
border-radius:15px;
position:relative;
max-height:90vh;
overflow:auto;
">

<button
onclick="closeView()"
style="
position:absolute;
right:15px;
top:15px;
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
">

✖

</button>

<div id="viewData"></div>

</div>

</div>

<div id="premiumPopup"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:9999;
">

<div
style="
background:white;
width:95%;
max-width:900px;
margin:30px auto;
padding:20px;
border-radius:15px;
max-height:90vh;
overflow:auto;
position:relative;
">

<button
onclick="closePremiumUsers()"
style="
position:absolute;
right:15px;
top:15px;
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
">

✖

</button>

<h2 style="margin-bottom:20px;">
👑 Premium Members
</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Photo</th>
<th>Name</th>
<th>Mobile</th>
<th>City</th>

</tr>

</thead>

<tbody id="premiumTable">

</tbody>

</table>

</div>

</div>

</body>
</html>
